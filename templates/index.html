<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Guest Post Finder - CodexGuruu</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 30px 0; }
        .main-card { background: white; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 900px; margin: 0 auto; }
        .header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 25px; border-radius: 16px 16px 0 0; text-align: center; }
        .prospect-card { border-left: 4px solid #667eea; margin-bottom: 15px; }
        .email-body { background: #f8f9fa; padding: 15px; border-radius: 8px; white-space: pre-wrap; font-family: monospace; font-size: 14px; }
    </style>
</head>
<body>
    <div class="main-card">
        <div class="header">
            <h1>🔗 AI Guest Post Finder</h1>
            <p class="mb-0">Find opportunities & generate personalized outreach emails</p>
        </div>
        
        <div class="p-4">
            <div id="setupForm">
                <div class="row g-3">
                    <div class="col-12">
                        <label class="form-label"><strong>Anthropic API Key</strong></label>
                        <input type="password" class="form-control" id="anthropicKey" placeholder="sk-ant-...">
                        <small class="text-muted">Get free $5 credit: <a href="https://console.anthropic.com" target="_blank">console.anthropic.com</a></small>
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label"><strong>Your Website</strong></label>
                        <input type="url" class="form-control" id="yourSite" value="https://codexguruu.com">
                    </div>
                    
                    <div class="col-md-6">
                        <label class="form-label"><strong>Your Niche</strong></label>
                        <input type="text" class="form-control" id="niche" placeholder="e.g., Python, SEO, WordPress">
                    </div>
                </div>
                
                <button class="btn btn-primary btn-lg w-100 mt-4" id="startBtn" onclick="startCampaign()">
                    🚀 Find Guest Posts & Generate Emails
                </button>
                
                <div id="progress" class="alert alert-info mt-3" style="display:none;">
                    <div class="spinner-border spinner-border-sm me-2"></div>
                    <span id="progressText">Finding prospects... (takes 3-5 minutes)</span>
                </div>
            </div>
            
            <div id="results" style="display:none;">
                <div class="alert alert-success">
                    ✅ <strong>Done!</strong> <span id="resultsCount"></span> emails ready
                </div>
                
                <div class="mb-3">
                    <button class="btn btn-outline-primary me-2" onclick="downloadCSV()">📥 Download CSV</button>
                    <button class="btn btn-outline-secondary" onclick="location.reload()">🔄 New Campaign</button>
                </div>
                
                <div id="emailsList"></div>
            </div>
        </div>
    </div>

    <script>
        let currentCampaign = null;

        async function startCampaign() {
            const data = {
                anthropic_key: document.getElementById('anthropicKey').value,
                your_site: document.getElementById('yourSite').value,
                niche: document.getElementById('niche').value
            };

            if (!data.anthropic_key || !data.niche) {
                alert('Please enter API key and niche!');
                return;
            }

            document.getElementById('startBtn').disabled = true;
            document.getElementById('progress').style.display = 'block';
            
            try {
                const response = await fetch('/start-campaign', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(data)
                });
                
                const result = await response.json();
                
                if (result.campaign_id) {
                    fetchCampaign(result.campaign_id);
                }
            } catch (error) {
                alert('Error: ' + error.message);
                document.getElementById('startBtn').disabled = false;
                document.getElementById('progress').style.display = 'none';
            }
        }

        async function fetchCampaign(id) {
            const response = await fetch('/campaign/' + id);
            const campaign = await response.json();
            
            if (campaign.status === 'completed') {
                displayResults(campaign);
            } else if (campaign.status === 'failed') {
                alert('Failed: ' + (campaign.error || 'Unknown error'));
                location.reload();
            }
        }

        function displayResults(campaign) {
            currentCampaign = campaign;
            document.getElementById('setupForm').style.display = 'none';
            document.getElementById('results').style.display = 'block';
            document.getElementById('resultsCount').textContent = campaign.emails.length;

            const html = campaign.emails.map((e, i) => `
                <div class="card prospect-card">
                    <div class="card-header bg-light">
                        <strong>#${i+1}</strong> ${e.prospect.title.substring(0, 60)}
                        <br><small><a href="${e.prospect.url}" target="_blank">${e.prospect.url}</a></small>
                    </div>
                    <div class="card-body">
                        <p><strong>Subject:</strong> ${e.subject}</p>
                        <div class="email-body">${e.body}</div>
                        <button class="btn btn-sm btn-success mt-2" onclick="copyEmail(${i})">📋 Copy Email</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('emailsList').innerHTML = html;
        }

        function copyEmail(i) {
            const e = currentCampaign.emails[i];
            navigator.clipboard.writeText('Subject: ' + e.subject + '\n\n' + e.body);
            alert('Copied!');
        }

        function downloadCSV() {
            let csv = 'Site,URL,Subject,Body\n';
            currentCampaign.emails.forEach(e => {
                csv += `"${e.prospect.title}","${e.prospect.url}","${e.subject}","${e.body.replace(/"/g, '""')}"\n`;
            });
            
            const blob = new Blob([csv], { type: 'text/csv' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'backlink-emails.csv';
            a.click();
        }
    </script>
</body>
</html>
